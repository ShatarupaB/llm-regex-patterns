# ---------------------------------------------------------------------------
# Rhombus — Distributed NL-to-Regex Data Processing Platform
#
# DEV SETUP: Spark runs in local[*] mode INSIDE the celery_worker container.
# The spark-master / spark-worker services are commented out — you don't need
# them until you want to demo a real distributed cluster (day 7-8).
# To enable them: uncomment the spark services and set
# SPARK_MASTER_URL=spark://spark-master:7077 in your .env
# ---------------------------------------------------------------------------

services:

  # ── Data stores ───────────────────────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rhombus}
      POSTGRES_USER: ${POSTGRES_USER:-rhombus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rhombus}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rhombus}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Backend ───────────────────────────────────────────────────────────────

  web:
    build:
      context: ./backend
      dockerfile: ../docker/django.Dockerfile
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
      - shared_media:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build:
      context: ./backend
      dockerfile: ../docker/celery.Dockerfile
    command: celery -A config worker --loglevel=info --concurrency=2
    volumes:
      - ./backend:/app
      - shared_media:/app/media
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # No spark-master dependency — PySpark runs locally inside this container
    # using local[*] mode (all CPU cores on this machine). No cluster needed.

  flower:
    build:
      context: ./backend
      dockerfile: ../docker/celery.Dockerfile
    command: celery -A config flower --port=5555
    ports:
      - "5555:5555"
    env_file:
      - .env
    depends_on:
      - celery_worker

  # ── Spark cluster (OPTIONAL — uncomment for distributed demo on day 7+) ──
  # To use: set SPARK_MASTER_URL=spark://spark-master:7077 in .env
  # and add the spark-master dependency back to celery_worker above.
  #
  # spark-master:
  #   image: apache/spark:3.5.0
  #   command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
  #   ports:
  #     - "8080:8080"
  #     - "7077:7077"
  #   volumes:
  #     - shared_media:/app/media
  #
  # spark-worker:
  #   image: apache/spark:3.5.0
  #   command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
  #   environment:
  #     - SPARK_WORKER_MEMORY=2g
  #     - SPARK_WORKER_CORES=2
  #   depends_on:
  #     - spark-master
  #   volumes:
  #     - shared_media:/app/media

  # ── Frontend ──────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - web

volumes:
  postgres_data:
  shared_media:
